<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zeus-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <linearGradient id="lightning-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#zeus-bg-gradient)" />

  <!-- Zeus figure - simplified classical Greek style -->
  <g stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="100" cy="60" r="18" />
    
    <!-- Crown/laurel -->
    <path d="M 82 55 Q 85 48 90 50 Q 92 45 95 47 Q 97 42 100 44 Q 103 42 105 47 Q 108 45 110 50 Q 115 48 118 55" />
    
    <!-- Beard -->
    <path d="M 88 70 Q 88 78 95 80 Q 100 82 105 80 Q 112 78 112 70" />
    <path d="M 92 72 Q 92 76 96 77" />
    <path d="M 100 74 Q 100 78 100 80" />
    <path d="M 108 72 Q 108 76 104 77" />
    
    <!-- Body - toga/robe -->
    <path d="M 100 78 L 100 120" />
    <path d="M 100 85 Q 75 90 70 120 L 70 145" />
    <path d="M 100 85 Q 125 90 130 120 L 130 145" />
    
    <!-- Toga draping -->
    <path d="M 85 95 Q 100 100 115 95" />
    <path d="M 80 110 Q 100 115 120 110" />
    
    <!-- Arms -->
    <path d="M 95 90 Q 65 95 55 110 L 50 125" />
    <path d="M 105 90 Q 135 95 145 110 L 150 125" />
    
    <!-- Legs -->
    <path d="M 95 145 L 90 175" />
    <path d="M 105 145 L 110 175" />
  </g>

  <!-- Lightning bolt in hand -->
  <g fill="url(#lightning-gradient)" stroke="#f59e0b" stroke-width="1.5">
    <path d="M 150 125 L 140 145 L 148 145 L 138 165 L 155 145 L 147 145 Z" />
  </g>

  <!-- Additional lightning effects -->
  <g stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 145 115 L 147 120" />
    <path d="M 155 120 L 157 127" />
    <path d="M 152 130 L 154 135" />
  </g>
</svg>
